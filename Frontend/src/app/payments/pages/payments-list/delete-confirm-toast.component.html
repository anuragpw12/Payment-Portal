<div class="confirm-toast">
  <div class="confirm-toast__message">{{ message }}</div>
  <div class="confirm-toast__actions">
    <button type="button" class="btn btn-sm btn-danger" (click)="confirm()">Yes</button>
    <button type="button" class="btn btn-sm btn-light" (click)="cancel()">No</button>
  </div>
</div>
